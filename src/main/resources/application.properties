spring.application.name=technomade

# info do banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/technomade
spring.datasource.username=${DB_USERNAME:technomade}
spring.datasource.password=${DB_PASSWORD:}

# info do jpa
## atualiza o banco automaticamente baseado nas entidades
spring.jpa.hibernate.ddl-auto=update

## mostra queries no console
spring.jpa.show-sql=true

## formatar as queries para ficar legivel no console
spring.jpa.properties.hibernate.format_sql=true

## otimizar sql para postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# inicialização de dados
## executar scripts sql sempre q iniciar
spring.sql.init.mode=always
## criar/atualizar tabelas antes de executar o data.sql
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=${JWT_SECRET:}

# porta do back
server.port=8080

# Chatbot IA
chatbot.anthropic.api-key=${ANTHROPIC_API_KEY:}
chatbot.anthropic.model=claude-sonnet-4-6
chatbot.anthropic.max-tokens=1024
